---
# Type Registry v0.1
types:
  - id: receipt
    name: 收據
    priority: 10
    handler: intake
  - id: screenshot
    name: 截圖
    priority: 50
    handler: intake
  - id: photo
    name: 相片
    priority: 99
    handler: intake
    examples:
      - "一張海邊風景相"
      - "門口自拍照"
      - "公司活動大合照"
  - id: expense_text
    name: 費用（文字）
    priority: 20
    handler: expense
    patterns:
      # Match: -45  or -45 Vendor  or -45 Vendor Category  or decimals and English vendors
      text_regex: '^-\d+(?:\.\d+)?(?:\s+.+)?$'
    examples:
      - "12.5 lunch McCafe"
      - "-85 食飯"
      - "午餐 45 蚊"
  - id: expense_image
    name: 費用（相片）
    priority: 60
    handler: expense

  - id: unknown
    name: 未知
    priority: 999
    handler: intake

_llm_config:
  model: "openai/gpt-4.1-nano"
  max_tokens: 100
  temperature: 0
  confidence_thresholds:
    auto: 0.8
    ask_user: 0.5
